name: factbank-ci

# First-party CI gate for the FactBank project (v2). Distinct from the vendored
# GitChameleon benchmark's own upstream CI under v2/eval/gitchameleon/.github/.
on:
  push:
    paths: ["v2/**", ".github/workflows/factbank-ci.yml"]
  pull_request:
    paths: ["v2/**", ".github/workflows/factbank-ci.yml"]

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install numpy "rank-bm25==0.2.2" jinja2 pytest
          pip install -e v2/package
      - name: Release gate (schema, ids, links, templates, smoke)
        run: python v2/tools/check_release.py
      - name: Package tests
        run: pytest v2/package/tests -q
